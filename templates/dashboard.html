<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

    <div class="container mt-5">

        <h1 class="text-center mb-5">
            Blockchain Security Dashboard
        </h1>

        <div class="row">

            <!-- Total Blocks -->
            <div class="col-md-4">

                <div class="card bg-primary text-white p-4">

                    <h3>Total Blocks</h3>

                    <h1>{{ total_blocks }}</h1>

                </div>

            </div>

            <!-- Total Files -->
            <div class="col-md-4">

                <div class="card bg-success text-white p-4">

                    <h3>Total Files</h3>

                    <h1>{{ total_files }}</h1>

                </div>

            </div>

            <!-- Security Status -->
            <div class="col-md-4">

                <div class="card bg-warning text-dark p-4">

                    <h3>Security Status</h3>

                    <h1>Secure</h1>

                </div>

            </div>

        </div>

        <div class="mt-5">

            <a href="/" class="btn btn-primary">
                Upload File
            </a>

            <a href="/verify" class="btn btn-success">
                Verify Integrity
            </a>

            <a href="/blockchain" class="btn btn-warning">
                View Blockchain
            </a>

        </div>

    </div>

</body>
</html>
