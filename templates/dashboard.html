<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #0f172a;
        color: white;
    }

    .glass {
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(10px);
        border-radius: 15px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .card-hover {
        transition: 0.3s;
    }

    .card-hover:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    .sidebar a {
        color: white;
        display: block;
        padding: 10px;
        text-decoration: none;
        transition: 0.3s;
    }

    .sidebar a:hover {
        background: rgba(255,255,255,0.1);
        padding-left: 15px;
    }
    </style>
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3" style="width:260px; min-height:100vh; background:#111827;">
        <h4 class="mb-4">🔐 Blockchain</h4>

        <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="/upload"><i class="bi bi-upload"></i> Upload</a>
        <a href="/verify"><i class="bi bi-shield-check"></i> Verify</a>
        <a href="/blockchain"><i class="bi bi-diagram-3"></i> Blockchain</a>
        <a href="/logout" class="text-danger mt-4"><i class="bi bi-box-arrow-right"></i> Logout</a>
    </div>

    <!-- MAIN -->
    <div class="p-4 w-100">

        <h2>Dashboard</h2>
        <p>Secure Blockchain File System</p>

        <div class="row mt-4">

            <div class="col-md-6">
                <div class="glass p-4 card-hover">
                    <h5>Total Blocks</h5>
                    <h2>{{ total_blocks }}</h2>
                </div>
            </div>

            <div class="col-md-6">
                <div class="glass p-4 card-hover">
                    <h5>Total Files</h5>
                    <h2>{{ total_files }}</h2>
                </div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
